name: C++ CI Pipeline

# 1. When should this run?
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# 2. What should it do?
jobs:
  build:
    # Boot up a fresh Ubuntu Linux server
    runs-on: ubuntu-latest

    steps:
    # Step A: Download your repository's code onto the server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step B: Compile the C++ file
    - name: Compile Planter Logic
      run: g++ sensor.cpp -o sensor_app

    # Step C: Execute the compiled program to ensure it doesn't crash
    - name: Run Application
      run: ./sensor_app